name: Build and Deploy Plugins

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Checkout builds branch
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"
        continue-on-error: true

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build plugins
        run: |
          cd src
          chmod +x gradlew
          ./gradlew make makePluginsJson
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Ensure builds branch exists
        run: |
          cd builds 2>/dev/null || (git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} builds && cd builds && git checkout --orphan builds && git reset --hard && git commit --allow-empty -m "init builds branch" && git push origin builds)
          true

      - name: Copy built files to builds branch
        run: |
          mkdir -p builds
          find src -name "*.cs3" -exec cp {} builds/ \;
          find src -name "plugins.json" -exec cp {} builds/ \;
          cp src/repo.json builds/ 2>/dev/null || true

      - name: Deploy to builds branch
        run: |
          cd builds
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "🚀 Build: $(date +'%Y-%m-%d %H:%M:%S') — ${{ github.sha }}"
          git push origin HEAD:builds
